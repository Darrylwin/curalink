name: Curalink CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Job 1: CI - build and tests
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: curalink_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checckout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Run tests
        run: mvn test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: curalink_test
          DB_USERNAME: test
          DB_PASSWORD: test
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          MAIL_HOST: smtp.gmail.com
          MAIL_PORT: 587
          MAIL_USERNAME: test@test.com
          MAIL_PASSWORD: test
          CORS_ALLOWED_ORIGINS: http://localhost:3000

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: curalink-jar
          path: target/curalink-0.0.1-SNAPSHOT.jar
          retention-days: 7
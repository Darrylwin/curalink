services:

  app:
    build: .
    container_name: curalink-api
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DB_HOST: db  # surcharge nécessaire
    depends_on:
      db:
        condition: service_healthy
    networks:
      - curalink-network

  db:
    image: postgres:16-alpine
    container_name: curalink-db
    ports:
      - "5432:5432"
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - curalink-network

volumes:
  postgres_data:

networks:
  curalink-network:
    driver: bridge
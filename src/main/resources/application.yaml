spring:
  application:
    name: curalink

  # Database setup
  datasource:
    url: jdbc:postgresql://localhost:5432/curalink
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect


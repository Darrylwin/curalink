spring:
  application:
    name: curalink

  # Database setup
  datasource:
    url: jdbc:postgresql://localhost:5432/curalink
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Database versioning configuration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migration: true

# Jwt configuration
jwt:
  secret:
    key: uWBtEyg+ABhPvngAqVHv+NUt8V8h2YW1sj8buY39lBY=

# Cors configuration
cors:
  allowed-origins: http://localhost:3000,http://localhost:3005

# Swagger configuration
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

server:
  servlet:
    context-path: /api

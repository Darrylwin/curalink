spring:
  application:
    name: curalink

  datasource:
    url: jdbc:postgresql://localhost:5432/curalink
    username: posgres
    password: posgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
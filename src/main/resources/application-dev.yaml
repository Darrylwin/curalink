spring:
  application:
    name: curalink

  # Database setup
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:curalink}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
      # Migrations generation config
#      jakarta.persistence.schema-generation.scripts.action: create
#      jakarta.persistence.schema-generation.scripts.create-target: src/main/resources/db/changelog/changes/V1__init_schema.sql # This is for the V1 of the app

  # Desable Liquibase in dev
  liquibase:
    enabled: false

  # Email configuration
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enabled: true
            required: true
          connectionTimeout: 5000
          timeout: 5000
          writetimeout: 5000

# Jwt configuration
jwt:
  secret:
    key: ${JWT_SECRET_KEY}

# Cors configuration
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3005}

# Swagger configuration - Desabled in dev to load app fastly
springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

server:
  servlet:
    context-path: /api